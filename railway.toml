[build]
builder = "nixpacks"

[build.nixpacks]
providers = ["node", "python"]
buildCmd = "cd frontend && npm install && npm run build && cd ../backend && pip install -r requirements.txt"

[deploy]
startCommand = "cd backend && uvicorn server:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
